<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Ranker</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --bg: #1e1e2f;
            --panel: #2a2a3d;
            --border: #3a3a55;
            --text: #f1f1f1;
            --muted: #b0b0c3;
            --grad: linear-gradient(135deg, #6aa6ff, #7cf5c4);
        }

        body {
            font-family: 'Space Grotesk';
            background: var(--bg);
            color: var(--text);
            margin: 0;
            font-size: 16px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 40px;
        }

        h1 {
            font-size: 44px;
        }

        h2 {
            font-size: 26px;
        }

        .accent {
            background: var(--grad);
            -webkit-background-clip: text;
            color: transparent;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
        }

        label {
            font-size: 15px;
            color: var(--muted);
        }

        select,
        textarea,
        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #1a1a28;
            color: white;
            font-size: 15px;
        }

        textarea {
            min-height: 160px;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row>div {
            flex: 1;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }

        .btn-primary {
            background: var(--grad);
            color: black;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: white;
            text-decoration: none;
        }

        .actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .resume-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-top: 12px;
        }

        .rank {
            font-size: 16px;
            font-weight: bold;
        }

        .score-bar {
            height: 8px;
            background: #111;
            border-radius: 5px;
            margin-top: 6px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            background: var(--grad);
        }

        .view-link {
            color: #6aa6ff;
            text-decoration: none;
            font-size: 15px;
        }

        .loader {
            display: none;
            margin-top: 10px;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>Resume <span class="accent">Ranker</span></h1>

        <div class="card">
            <form method="POST" enctype="multipart/form-data"
                onsubmit="document.getElementById('loader').style.display='block'">

                <div class="row">
                    <div>
                        <label>Role</label>
                        <select name="role">
                            <option value="accountant" {% if role=="accountant" %}selected{% endif %}>Accountant
                            </option>
                            <option value="chef" {% if role=="chef" %}selected{% endif %}>Chef</option>
                            <option value="information_technology" {% if role=="information_technology" %}selected{%
                                endif %}>IT</option>
                        </select>
                    </div>

                    <div>
                        <label>Top N</label>
                        <input type="number" name="top_n" min="1">
                    </div>
                </div>
                
                <div>
                    <label>Ranking Method</label>
                    <select name="model_type">
                        <option value="tfidf">TF-IDF (Default)</option>
                        <option value="nb">Naive Bayes</option>
                        <option value="lr">Logistic Regression</option>
                        <option value="rf">Random Forest</option>
                    </select>
                </div>

                <div style="margin-top:15px;">
                    <label>Job Description</label>
                    <textarea name="job_description">{{ jd }}</textarea>
                </div>

                <div style="margin-top:15px;">
                    <label>Upload Resumes (Optional)</label>
                    <input type="file" name="resumes" multiple>
                </div>

                <div class="actions">
                    <button class="btn btn-primary">Rank Resumes</button>
                    <a href="/report" class="btn btn-primary" target="_blank">View Report</a>
                </div>

                <div id="loader" class="loader">Processing resumes...</div>
            </form>
        </div>

        {% if results %}
        <div style="margin-top:30px;">
            <h2>Top Results</h2>

            {% for file, score in results %}
            <div class="resume-card">
                <div>
                    <div class="rank">#{{ loop.index }} - {{ file }}</div>

                    <div class="score-bar">
                        <!-- <div class="score-fill" style="width: {{ (score|float * 100)|round(1) }}%"></div> -->
                    </div>

                    <div style="font-size:13px;">Score: {{ "%.3f"|format(score|float) }}</div>
                </div>

                <a href="/view/{{ file }}?role={{ role }}&source={{ 'upload' if 'data/' in file else 'dataset' }}"
                    target="_blank" class="view-link">
                    View →
                </a>
            </div>
            {% endfor %}

        </div>
        {% elif results is not none %}
        <p>No results found</p>
        {% endif %}

    </div>
</body>

</html>
