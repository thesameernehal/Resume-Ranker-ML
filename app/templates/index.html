<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Ranker</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --bg: #0e1116;
            --panel: #1a2030;
            --border: #2a3346;
            --text: #e6e9f2;
            --muted: #8b94aa;
            --grad: linear-gradient(135deg, #7cf5c4, #6aa6ff);
        }

        body {
            font-family: 'Space Grotesk';
            background: var(--bg);
            color: var(--text);
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 40px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .accent {
            background: var(--grad);
            -webkit-background-clip: text;
            color: transparent;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
        }

        label {
            font-size: 13px;
            color: var(--muted);
        }

        select,
        textarea,
        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0e1116;
            color: white;
        }

        textarea {
            min-height: 120px;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row>div {
            flex: 1;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary {
            background: var(--grad);
            color: black;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 10px;
        }

        .actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .resume-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-top: 12px;
        }

        .rank {
            font-weight: bold;
        }

        .score-bar {
            height: 6px;
            background: #111;
            border-radius: 5px;
            margin-top: 6px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            background: var(--grad);
        }

        .view-link {
            color: #6aa6ff;
            text-decoration: none;
        }

        .loader {
            display: none;
            margin-top: 10px;
            color: var(--muted);
        }
    </style>

</head>

<body>
    <div class="container">

        <h1>Resume <span class="accent">Ranker</span></h1>

        <!-- FORM -->

        <div class="card">
            <form method="POST" onsubmit="document.getElementById('loader').style.display='block'">

                
                <div class="row">
                    <div>
                        <label>Role</label>
                        <select name="role">
                            <option value="accountant" {% if role=="accountant" %}selected{% endif %}>Accountant
                            </option>
                            <option value="chef" {% if role=="chef" %}selected{% endif %}>Chef</option>
                            <option value="information_technology" {% if role=="information_technology" %}selected{%
                                endif %}>Information Technology</option>
                        </select>
                    </div>

                    <div>
                        <label>Top N</label>
                        <input type="number" name="top_n" value="5">
                    </div>
                </div>

                <div style="margin-top:15px;">
                    <label>Job Description</label>
                    <textarea name="job_description">{{ jd }}</textarea>
                </div>

                <div class="actions">
                    <button class="btn btn-primary">Rank Resumes</button>
                    <a href="/report" class="btn-ghost" target="_blank">View Report</a>
                </div>

                <div id="loader" class="loader">Processing resumes...</div>

            </form>
            

        </div>

        <!-- RESULTS -->

        {% if results %}

        <div style="margin-top:30px;">

            
            <h2>Top Results</h2>

            {% for file, score in results %}
            <div class="resume-card">

                <div>
                    <div class="rank">#{{ loop.index }} - {{ file }}</div>

                    <div class="score-bar">
                        <!-- <div class="score-fill" style="width: {{ (score|float * 100)|round(1) }}%"></div> -->
                    </div>

                    <div style="font-size:12px;">Score: {{ "%.3f"|format(score|float) }}</div>
                </div>

                <a href="/view/{{ file }}?role={{ role }}" target="_blank" class="view-link">
                    View →
                </a>

            </div>
            {% endfor %}
    

        </div>

        {% elif results is not none %} <p>No results found</p>
        {% endif %}

    </div>
</body>

</html>
